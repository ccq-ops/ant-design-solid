name: Release

on:
  push:
    branches:
      - main
      - next
      - alpha

concurrency: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: write
  pull-requests: write
  id-token: write

env:
  COREPACK_ENABLE_DOWNLOAD_PROMPT: 0

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    environment: npm
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: corepack pnpm install --frozen-lockfile

      - name: Lint
        run: corepack pnpm lint

      - name: Check formatting
        run: corepack pnpm format:check

      - name: Typecheck
        run: corepack pnpm -r typecheck

      - name: Test
        run: corepack pnpm -r test

      - name: Build
        run: corepack pnpm -r build

      - name: Determine release channel
        id: release-channel
        run: |
          if [ "${GITHUB_REF_NAME}" = "main" ]; then
            echo "npm-tag=latest" >> "$GITHUB_OUTPUT"
            echo "pr-title=Version Packages" >> "$GITHUB_OUTPUT"
          elif [ "${GITHUB_REF_NAME}" = "alpha" ]; then
            echo "npm-tag=alpha" >> "$GITHUB_OUTPUT"
            echo "pr-title=Version Packages (alpha)" >> "$GITHUB_OUTPUT"
          else
            echo "npm-tag=next" >> "$GITHUB_OUTPUT"
            echo "pr-title=Version Packages (next)" >> "$GITHUB_OUTPUT"
          fi

      - name: Create release PR or publish
        uses: changesets/action@v1
        with:
          branch: ${{ github.ref_name }}
          title: ${{ steps.release-channel.outputs.pr-title }}
          version: corepack pnpm version-packages
          publish: corepack pnpm release --tag ${{ steps.release-channel.outputs.npm-tag }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_CONFIG_PROVENANCE: true
